;;
[${BRAND}]
user = ${PHP_USER}
group = ${PHP_USER}
listen = 9000
listen.owner = ${PHP_USER}
listen.group = nginx
listen.mode = 0660
pm = ondemand
pm.max_children = 100
pm.max_requests = 1000
clear_env = no
;;
;; [php ini] settings
php_admin_flag[expose_php] = Off
php_admin_flag[short_open_tag] = On
php_admin_flag[display_errors] = Off
php_admin_flag[log_errors] = On
php_admin_flag[mysql.allow_persistent] = On
php_admin_flag[mysqli.allow_persistent] = On
php_admin_value[default_charset] = "UTF-8"
php_admin_value[memory_limit] = 1024M
php_admin_value[max_execution_time] = 600
php_admin_value[max_input_time] = 600
php_admin_value[max_input_vars] = 50000
php_admin_value[post_max_size] = 64M
php_admin_value[upload_max_filesize] = 64M
php_admin_value[realpath_cache_size] = 4096k
php_admin_value[realpath_cache_ttl] = 86400
php_admin_value[session.gc_maxlifetime] = 28800
php_admin_value[date.timezone] = "${TIMEZONE}"
php_admin_value[error_log] = "${MAGENTO_ROOT_PATH}/${CURRENT_SYMLINK}/var/log/php-fpm-error.log"
php_admin_value[upload_tmp_dir] = "${MAGENTO_ROOT_PATH}/${CURRENT_SYMLINK}/var/tmp"
php_admin_value[sys_temp_dir] = "${MAGENTO_ROOT_PATH}/${CURRENT_SYMLINK}/var/tmp"
;;
;; [opcache] settings
php_admin_value[opcache.blacklist_filename] = "${MAGENTO_ROOT_PATH}/${CURRENT_SYMLINK}/opcache.blacklist"
php_admin_value[opcache.error_log] = "${MAGENTO_ROOT_PATH}/${CURRENT_SYMLINK}/var/log/opcache-error.log"
