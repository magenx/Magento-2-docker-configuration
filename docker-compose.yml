# -----------------------------------------------------------------------------------------------------------------------
#  Configure image labels
# -----------------------------------------------------------------------------------------------------------------------
x-build-labels: &build_labels
  org.opencontainers.image.authors: "admin@magenx.com"
  org.opencontainers.image.source: "https://github.com/magenx/Magento-2-docker-configuration"

# -----------------------------------------------------------------------------------------------------------------------
#  Configure logger driver
# -----------------------------------------------------------------------------------------------------------------------
x-logger: &logger
  logging:
    driver: syslog
    options:
      syslog-address: "unixgram:///dev/log"
      mode: non-blocking
      tag: "[ {{.Name}} ]"

# -----------------------------------------------------------------------------------------------------------------------
#  Configure ulimits
# -----------------------------------------------------------------------------------------------------------------------
x-ulimits: &ulimits
  ulimits:
    memlock:
      soft: -1
      hard: -1
    nofile:
      soft: 65536
      hard: 65536

# -----------------------------------------------------------------------------------------------------------------------
#  Configure healthcheck
# -----------------------------------------------------------------------------------------------------------------------
x-healthcheck_default: &healthcheck_default
  start_period: ${HEALTHCHECK_START_PERIOD}
  interval: ${HEALTHCHECK_INTERVAL}
  timeout: ${HEALTHCHECK_TIMEOUT}
  retries: ${HEALTHCHECK_RETRIES}

# -----------------------------------------------------------------------------------------------------------------------
#  Configure php build args
# -----------------------------------------------------------------------------------------------------------------------
x-php_args: &php_args
  PHP_DEV_IMAGE:
  PHP_FPM_IMAGE:
  PHP_USER:
  PHP_IMAGE:
  PHP_EXTENSION:
  PHP_FPM:
  PHP_UID:

# -----------------------------------------------------------------------------------------------------------------------
#  Configure php env variables
# -----------------------------------------------------------------------------------------------------------------------
x-php_env: &php_env
  MARIADB_DATABASE:
  MARIADB_USER:
  MARIADB_PASSWORD:
  RABBITMQ_PASSWORD:
  REDIS_PASSWORD:
  OPENSEARCH_PASSWORD:
  BRAND:
  DOMAIN:
  MAGENTO_ROOT_PATH:
  ADMIN_PATH:
  CRYPT_KEY:
  CURRENT_SYMLINK:
  GRAPHQL_ID_SALT:
      
# -----------------------------------------------------------------------------------------------------------------------
#  Configure magento build args
# -----------------------------------------------------------------------------------------------------------------------
x-magento_args: &magento_args
  BRAND:
  DOMAIN:
  ADMIN_PATH:
  MAGENTO_ROOT_PATH:
  TIMEZONE:
  CURRENT_SYMLINK:

# -----------------------------------------------------------------------------------------------------------------------
#  Services configuration parameters
# -----------------------------------------------------------------------------------------------------------------------
services:

# -----------------------------------------------------------------------------------------------------------------------
#  MariaDB is a high performing open source relational database
# -----------------------------------------------------------------------------------------------------------------------
  mariadb:
    container_name: mariadb
    hostname: mariadb
    build:
      context: ./mariadb
      labels:
        <<: *build_labels
      args:
        MARIADB_IMAGE:
    environment:
      MARIADB_AUTO_UPGRADE:
      MARIADB_DISABLE_UPGRADE_BACKUP:
      MARIADB_RANDOM_ROOT_PASSWORD:
      MARIADB_DATABASE:
      MARIADB_USER:
      MARIADB_PASSWORD:
      TIMEZONE:
    expose:
      - "${MARIADB_UID}"
    networks:
      - backend
    volumes:
      - ${CONTAINER_DATA_PATH}/mariadb:/var/lib/mysql
    user: "${MARIADB_UID}:${MARIADB_UID}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized", "--innodb_buffer_pool_loaded"]
      <<: *healthcheck_default
    <<: [*ulimits, *logger]

# -----------------------------------------------------------------------------------------------------------------------
#  Opensearch is a powerful open source search and analytics engine
# -----------------------------------------------------------------------------------------------------------------------
  opensearch:
    container_name: opensearch
    hostname: opensearch
    build:
      context: ./opensearch
      labels:
        <<: *build_labels
      args:
        OPENSEARCH_IMAGE:
    develop:
      watch:
        - path: ./opensearch
          action: rebuild
    environment:
      - cluster.name=${BRAND}-cluster
      - node.name=${BRAND}-node1
      - node.attr.rack=${BRAND}-rack1
      - discovery.type=single-node
      - cluster.routing.allocation.enable=all
      - bootstrap.memory_lock=true
      - plugins.security.ssl.transport.enforce_hostname_verification=false
      - plugins.security.ssl.http.enabled=false
      - plugins.security.allow_unsafe_democertificates=true
      - plugins.security.allow_default_init_securityindex=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_XMS} ${OPENSEARCH_XMX}
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
    expose:
      - "${OPENSEARCH_UID}"
      - "9300"
    networks:
      - frontend
    volumes:
      - ${CONTAINER_DATA_PATH}/opensearch:/usr/share/opensearch/data
      - ${CONTAINER_DATA_PATH}/opensearch/logs:/usr/share/opensearch/logs
    user: "${OPENSEARCH_UID}:${OPENSEARCH_UID}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u 'admin:${OPENSEARCH_ADMIN_PASSWORD}' 'http://opensearch:${OPENSEARCH_UID}/_cluster/health' || exit 1"]
      <<: *healthcheck_default
    <<: [*ulimits, *logger]

# -----------------------------------------------------------------------------------------------------------------------
#  Redis is an open source key-value store that functions as a data structure server.
# -----------------------------------------------------------------------------------------------------------------------
  cache:
    image: &redis_image ${REDIS_IMAGE}
    container_name: cache
    hostname: cache
    command: >
      --bind cache
      --port ${REDIS_CACHE_UID}
      --save 300 10000
      --appendonly yes
      --activerehashing yes
      --loglevel warning
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_CACHE_SIZE}
      --maxmemory-policy allkeys-lru
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --replica-lazy-flush yes
      --lazyfree-lazy-user-del yes
    expose:
      - "${REDIS_CACHE_UID}"
    networks:
      - frontend
    volumes:
      - ${CONTAINER_DATA_PATH}/redis-cache:/data
    user: "${REDIS_CACHE_UID}:${REDIS_CACHE_UID}"
    restart: unless-stopped
    mem_limit: ${REDIS_CACHE_SIZE}
    <<: [*ulimits, *logger]

# -----------------------------------------------------------------------------------------------------------------------
#  Redis is an open source key-value store that functions as a data structure server.
# -----------------------------------------------------------------------------------------------------------------------
  session:
    image: *redis_image
    container_name: session
    hostname: session
    command: >
      --bind session
      --port ${REDIS_SESSION_UID}
      --save 60 100
      --appendonly yes
      --activerehashing yes
      --loglevel warning
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_SESSION_SIZE}
      --maxmemory-policy allkeys-lru
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --replica-lazy-flush yes
      --lazyfree-lazy-user-del yes
    expose:
      - "${REDIS_SESSION_UID}"
    networks:
      - frontend
    volumes:
      - ${CONTAINER_DATA_PATH}/redis-session:/data
    user: "${REDIS_SESSION_UID}:${REDIS_SESSION_UID}"
    restart: unless-stopped
    mem_limit: ${REDIS_SESSION_SIZE}
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "session", "-p", "${REDIS_SESSION_UID}", "-a", "${REDIS_PASSWORD}", "ping"]
      <<: *healthcheck_default
    <<: [*ulimits, *logger]

# -----------------------------------------------------------------------------------------------------------------------
#  RabbitMQ is an open source multi-protocol messaging broker
# -----------------------------------------------------------------------------------------------------------------------                
  rabbitmq:
    image: ${RABBITMQ_IMAGE}
    container_name: rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${BRAND}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${BRAND}
    expose:
      - "5672"
      - "15672"
    networks:
      - frontend
    volumes:
      - ${CONTAINER_DATA_PATH}/rabbitmq:/var/lib/rabbitmq
    user: "${RABBITMQ_UID}:${RABBITMQ_UID}"
    restart: unless-stopped
    mem_limit: 1G
    <<: [*ulimits, *logger]

# -----------------------------------------------------------------------------------------------------------------------
#  Varnish is an HTTP accelerator designed for content-heavy dynamic web sites as well as APIs.
# -----------------------------------------------------------------------------------------------------------------------                  
  varnish:
    container_name: varnish
    hostname: varnish
    build:
      context: ./varnish
      labels:
        <<: *build_labels
      args:
        VARNISH_IMAGE:
        VARNISH_SIZE:
        TIMEZONE:
    develop:
      watch:
        - path: ./varnish
          action: rebuild
    environment:
      DOMAIN:
      PROFILER:
    depends_on:
      - nginx
      - php
    ports:
      - "${VARNISH_PRIVATE_IP}:80"
    networks:
      - frontend
    volumes:
      - type: tmpfs
        target: /var/lib/varnish/varnishd:exec
        tmpfs:
          size: 64m
          mode: 1770
    user: "${VARNISH_UID}:${VARNISH_UID}"
    restart: unless-stopped
    mem_limit: ${VARNISH_SIZE}
    healthcheck:
      test: ["CMD", "varnishadm", "ping"]
      <<: *healthcheck_default
    <<: [*ulimits, *logger]

# -----------------------------------------------------------------------------------------------------------------------
#  Configure container to run php and php-fpm
# -----------------------------------------------------------------------------------------------------------------------    
  php:
    container_name: php
    hostname: php
    build:
      context: ./php
      labels:
        <<: *build_labels
      args: 
        <<: [*php_args, *magento_args]
    develop:
      watch:
        - path: ./php
          action: rebuild
    environment:
      <<: *php_env
    depends_on:
      mariadb:
        condition: service_healthy
    expose:
      - "${PHP_UID}"
    networks:
      - backend
      - frontend
    volumes:
      - ${MAGENTO_ROOT_PATH}/public:${MAGENTO_ROOT_PATH}/public:ro
      - ${MAGENTO_ROOT_PATH}/shared/var:${MAGENTO_ROOT_PATH}/shared/var
      - ${MAGENTO_ROOT_PATH}/shared/pub/media:${MAGENTO_ROOT_PATH}/shared/pub/media
      - ${MAGENTO_ROOT_PATH}/releases:${MAGENTO_ROOT_PATH}/releases
    working_dir: "${MAGENTO_ROOT_PATH}/${CURRENT_SYMLINK}"
    user: "${PHP_UID}:${PHP_UID}"
    entrypoint: ["php-fpm", "-F"]
    restart: unless-stopped
    <<: [*ulimits, *logger]

# -----------------------------------------------------------------------------------------------------------------------
#  Configure container for magento app
# -----------------------------------------------------------------------------------------------------------------------    
  magento:
    container_name: magento
    build:
      context: ./magento
      labels:
        <<: *build_labels
      args:
        <<: [*php_args, *magento_args]
    develop:
      watch:
        - path: ./magento
          action: rebuild
    environment:
      <<: *php_env
    volumes:
      - ${MAGENTO_ROOT_PATH}/public:${MAGENTO_ROOT_PATH}/public
      - ${MAGENTO_ROOT_PATH}/shared/var:${MAGENTO_ROOT_PATH}/shared/var
      - ${MAGENTO_ROOT_PATH}/shared/pub/media:${MAGENTO_ROOT_PATH}/shared/pub/media
      - ${MAGENTO_ROOT_PATH}/releases:${MAGENTO_ROOT_PATH}/releases
    working_dir: "${MAGENTO_ROOT_PATH}/${CURRENT_SYMLINK}"
    networks:
      - backend
      - frontend
    user: "${MAGENTO_UID}:${PHP_UID}"
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    <<: [*ulimits, *logger]

# -----------------------------------------------------------------------------------------------------------------------
#  Nginx is an open source reverse proxy server for HTTP, HTTPS
# -----------------------------------------------------------------------------------------------------------------------                   
  nginx:
    container_name: nginx
    hostname: nginx
    build:
      context: ./nginx
      labels:
        <<: *build_labels
      args:
        <<: [*php_args, *magento_args]
        NGINX_IMAGE:
        PHP_FPM:
        PROFILER:
        RESOLVER:
        RABBITMQ_PATH:
        ADMINER_PATH:
    develop:
      watch:
        - path: ./nginx
          action: rebuild
    depends_on:
      mariadb:
        condition: service_healthy
      php:
        condition: service_started
    expose:
      - "80"
    networks:
      - frontend 
    volumes:
      - ${MAGENTO_ROOT_PATH}/public:${MAGENTO_ROOT_PATH}/public:ro
      - ${MAGENTO_ROOT_PATH}/shared/var:${MAGENTO_ROOT_PATH}/shared/var:ro
      - ${MAGENTO_ROOT_PATH}/shared/pub/media:${MAGENTO_ROOT_PATH}/shared/pub/media:ro
      - ${MAGENTO_ROOT_PATH}/releases:${MAGENTO_ROOT_PATH}/releases:ro
      - ${CONTAINER_DATA_PATH}/nginx/log:/var/log/nginx
      - ${CONTAINER_DATA_PATH}/nginx/cache:/var/cache/nginx
    working_dir: "${MAGENTO_ROOT_PATH}/${CURRENT_SYMLINK}"
    user: "${NGINX_UID}:${NGINX_UID}"
    restart: unless-stopped
    <<: [*ulimits, *logger]

# -----------------------------------------------------------------------------------------------------------------------
#   Cron job scheduler run arbitrary commands, or "jobs", according to a schedule
# ----------------------------------------------------------------------------------------------------------------------- 
  cron:
    container_name: cron
    build:
      context: ./cron
      labels:
        <<: *build_labels
      args:
        <<: [*php_args, *magento_args]
        SUPERCRONIC:
        SUPERCRONIC_SHA1SUM:
        SUPERCRONIC_URL:
    develop:
      watch:
        - path: ./cron
          action: rebuild
    environment:
      <<: *php_env
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - frontend
      - backend
    volumes:
      - ${MAGENTO_ROOT_PATH}/public:${MAGENTO_ROOT_PATH}/public
      - ${MAGENTO_ROOT_PATH}/shared/var:${MAGENTO_ROOT_PATH}/shared/var
      - ${MAGENTO_ROOT_PATH}/shared/pub/media:${MAGENTO_ROOT_PATH}/shared/pub/media
      - ${MAGENTO_ROOT_PATH}/releases:${MAGENTO_ROOT_PATH}/releases
    working_dir: "${MAGENTO_ROOT_PATH}/${CURRENT_SYMLINK}"
    user: "${PHP_UID}:${PHP_UID}"
    entrypoint: ["/usr/local/bin/supercronic"]
    command: ["${MAGENTO_ROOT_PATH}/crontabs/${PHP_USER}"]
    restart: unless-stopped
    <<: [*ulimits, *logger]

# -----------------------------------------------------------------------------------------------------------------------
#   Fast and secure standalone server for resizing, processing, and converting images
# ----------------------------------------------------------------------------------------------------------------------- 
  imgproxy:
    image: ${IMGPROXY_IMAGE}
    container_name: imgproxy
    environment:
      - IMGPROXY_ALLOW_INSECURE=true
      - IMGPROXY_ALLOWED_SOURCES=local://,http://127.0.0.1/
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=${MAGENTO_ROOT_PATH}/shared/pub/media
      #- IMGPROXY_FALLBACK_IMAGE_PATH=${MAGENTO_ROOT_PATH}/shared/pub/media/catalog/product/placeholder/default/placeholder.jpg
      #- IMGPROXY_WATERMARK_PATH=${MAGENTO_ROOT_PATH}/shared/pub/media/catalog/product/placeholder/default/watermark.jpg
      - IMGPROXY_MAX_REDIRECTS=1
      - IMGPROXY_TTL=31536000
      - IMGPROXY_AUTO_WEBP=1
      - IMGPROXY_AUTO_AVIF=1
      - IMGPROXY_QUALITY=70
      - IMGPROXY_FORMAT_QUALITY=jpeg=70,avif=40,webp=60
      - IMGPROXY_BIND=0.0.0.0:${IMGPROXY_UID}
      - IMGPROXY_USE_ETAG=true
      - IMGPROXY_CONCURRENCY=10
      - IMGPROXY_TIMEOUT=5
      - IMGPROXY_READ_REQUEST_TIMEOUT=5
      - IMGPROXY_WRITE_RESPONSE_TIMEOUT=5
      - IMGPROXY_DOWNLOAD_TIMEOUT=5
      - IMGPROXY_ENABLE_DEBUG_HEADERS=true
    depends_on:
      nginx:
         condition: service_started
    volumes:
      - ${MAGENTO_ROOT_PATH}/shared/pub/media:${MAGENTO_ROOT_PATH}/shared/pub/media:ro
    expose:
      - "${IMGPROXY_UID}"
    networks:
      - frontend
    working_dir: "${MAGENTO_ROOT_PATH}/shared/pub/media"
    user: "${IMGPROXY_UID}:${IMGPROXY_UID}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      <<: *healthcheck_default
    <<: [*ulimits, *logger]


# -----------------------------------------------------------------------------------------------------------------------
#   Magento 2 docker webstack dashboard
# -----------------------------------------------------------------------------------------------------------------------
  dashboard-backend:
    build:
      context: ./dashboard/backend
      labels:
        <<: *build_labels
      dockerfile: Dockerfile
    container_name: dashboard-backend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    environment:
      DASHBOARD_JWT_SECRET:
      DASHBOARD_USERNAME:
      DASHBOARD_PASSWORD:
      DASHBOARD_UI_PORT:
      DASHBOARD_PORT:
      NGINX_STATUS_URL:
      PHPFPM_STATUS_URL:
      REDIS_CACHE_HOST:
      REDIS_SESSION_HOST:
      REDIS_PASSWORD:
      OPENSEARCH_HOST:
      OPENSEARCH_USER:
      OPENSEARCH_PASSWORD:
      RABBITMQ_USER:
      RABBITMQ_HOST:
      RABBITMQ_PASSWORD:
      MARIADB_USER:
      MARIADB_PASSWORD:
      MARIADB_DATABASE:
      MARIADB_HOST:
    expose:
      - "3001"
    volumes:
      - ${CONTAINER_DATA_PATH}/varnish:/var/varnishstat:ro
      - ${CONTAINER_DATA_PATH}/host:/var/host:ro
      - ${MAGENTO_ROOT_PATH}/shared/var/log:/var/profiler:ro
    networks:
      - frontend
      - backend
    restart: unless-stopped

  dashboard-frontend:
    build:
      context: ./dashboard/frontend
      labels:
        <<: *build_labels
      dockerfile: Dockerfile
    container_name: dashboard-frontend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    expose:
      - "8080"
    depends_on:
      - dashboard-backend
    networks:
      - frontend
    restart: unless-stopped

# -----------------------------------------------------------------------------------------------------------------------
#   Named networks list
# ----------------------------------------------------------------------------------------------------------------------- 
networks:
  frontend:
  backend:
